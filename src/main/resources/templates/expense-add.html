<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Add an Expense</title>
        <link rel="stylesheet" th:href="@{/css/expense-add.css}">
    </head>
    <body>
        <div class="container">
            <h1>Adding an Expense</h1>
            <h2>Please, fill out the information:</h2>
            <form th:action="@{/expenses/new}" method="post">
                <div class="form-group">
                    <label for="category" >Category</label>
                    <select id="category" name="category">
                        <optgroup label="Essentials">
                            <option value="rent">🏠 Rent / Mortgage</option>
                            <option value="groceries">🍽️ Groceries</option>
                            <option value="utilities">🔌 Utilities</option>
                            <option value="transportation">🚗 Transportation</option>
                        </optgroup>
                        <optgroup label="Personal & Lifestyle">
                            <option value="dining">☕ Dining Out</option>
                            <option value="entertainment">🎬 Entertainment</option>
                            <option value="clothing">👕 Clothing</option>
                            <option value="personalCare">💇 Personal Care</option>
                        </optgroup>
                        <optgroup label="Financial">
                            <option value="loanPayments">💳 Loan Payments</option>
                            <option value="savings">🏦 Savings</option>
                            <option value="subscriptions">💡 Subscriptions</option>
                        </optgroup>
                        <optgroup label="Other">
                            <option value="gifts">🎁 Gifts & Donations</option>
                            <option value="other">❓ Other</option>
                        </optgroup>
                    </select>
                </div>
                <div class="form-group">
                    <label for="description" >Description</label>
                    <input type="text" id="description" name="description">
                </div>
                <div class="form-group">
                    <label for="amount" >Amount</label>
                    <input type="number" id="amount" name="amount">
                </div>
                <div class="form-group">
                    <label for="date" >Date</label>
                    <input type="date" id="date" name="date">
                </div>
                <button type="submit">Submit</button>
            </form>
        </div>
    </body>
</html>
